<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="color-scheme" content="only light" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="모라고라" />
    <meta name="description" content="Moragora - AI 기반 논쟁 판결 플랫폼" />
    <meta property="og:title" content="모라고라 - AI가 논쟁의 마침표를 찍어드립니다." />
    <meta property="og:description" content="GPT, Gemini, Claude 가 독립적으로 판결하는 공정한 논쟁 플랫폼" />
    <meta property="og:image" content="https://team-moragora-client.vercel.app/ogCard2.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <title>모라고라 | Moragora</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="preload" as="image" href="/practice2.webp">
    <link rel="preload" as="image" href="/fight2.webp">
    <link rel="preload" as="image" href="/3vs3.webp">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded',function(){
        var root = document.getElementById('root');
        if(root){
          if(localStorage.getItem('moragora-theme')==='dark'){
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
        }
      });
    </script>
  </head>
  <body>
    <!-- PWA 스플래시 화면 -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:#1B2A4A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
      <img src="/icon-192.png" alt="" style="width:80px;height:80px;border-radius:20px;" />
      <div style="height:30px;display:flex;align-items:center;">
        <span id="splash-typed" style="color:#D4AF37;font-size:22px;font-weight:900;letter-spacing:-0.5px;"></span><span id="splash-cursor" style="display:inline-block;width:2px;height:22px;background:#D4AF37;margin-left:2px;animation:blink 0.7s step-end infinite;"></span>
      </div>
      <style>@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}</style>
    </div>
    <script>
      // 타이핑 애니메이션 — 순차 실행
      (function(){
        var el = document.getElementById('splash-typed');
        var cursor = document.getElementById('splash-cursor');
        if (!el) return;
        var typeSpeed = 80, deleteSpeed = 40;

        function typeText(text, cb) {
          var i = 0;
          (function t() {
            if (i < text.length) { el.textContent += text[i++]; setTimeout(t, typeSpeed); }
            else if (cb) cb();
          })();
        }
        function deleteAll(cb) {
          (function d() {
            var cur = el.textContent;
            if (cur.length > 0) { el.textContent = cur.slice(0, -1); setTimeout(d, deleteSpeed); }
            else if (cb) cb();
          })();
        }
        function deleteChars(n, cb) {
          var count = 0;
          (function d() {
            if (count < n && el.textContent.length > 0) { el.textContent = el.textContent.slice(0, -1); count++; setTimeout(d, deleteSpeed); }
            else if (cb) cb();
          })();
        }
        function pause(ms, cb) { setTimeout(cb, ms); }

        // 0.5초 커서 깜빡임 → 시퀀스 시작
        pause(500, function() {
          typeText('AI 논쟁 판결 플랫폼', function() {
            pause(800, function() {
              deleteAll(function() {
                pause(300, function() {
                  typeText('모라고라?', function() {
                    pause(600, function() {
                      deleteChars(1, function() {
                        pause(200, function() {
                          typeText('.', function() {
                            if (cursor) cursor.style.display = 'none';
                          });
                        });
                      });
                    });
                  });
                });
              });
            });
          });
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // standalone(PWA 설치) 여부 확인
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      // standalone이면 OS 스플래시가 있으므로 앱 내 스플래시 즉시 제거
      if (isStandalone) {
        var s = document.getElementById('splash');
        if (s) s.remove();
      }

      // 스플래시 제거 함수 (최소 5초 보장)
      var splashStart = Date.now();
      var splashMinMs = 10000;
      window.__removeSplash = function() {
        var elapsed = Date.now() - splashStart;
        var delay = Math.max(0, splashMinMs - elapsed);
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.style.transition = 'opacity 0.4s ease-out';
            splash.style.opacity = '0';
            setTimeout(function() { splash.remove(); }, 400);
          }
        }, delay);
      };
      // 안전장치: 15초 후 강제 제거 (로딩 실패 시)
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(function() { splash.remove(); }, 300); }
      }, 15000);
    </script>
  </body>
</html>
