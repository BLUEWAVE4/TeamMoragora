<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="color-scheme" content="only light" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="모라고라" />
    <meta name="description" content="Moragora - AI 기반 논쟁 판결 플랫폼" />
    <meta property="og:title" content="모라고라 - AI가 논쟁의 마침표를 찍어드립니다." />
    <meta property="og:description" content="GPT, Gemini, Claude 가 독립적으로 판결하는 공정한 논쟁 플랫폼" />
    <meta property="og:image" content="https://team-moragora-client.vercel.app/ogCard2.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <title>모라고라 | Moragora</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="preload" as="image" href="/practice2.webp">
    <link rel="preload" as="image" href="/fight2.webp">
    <link rel="preload" as="image" href="/3vs3.webp">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded',function(){
        var root = document.getElementById('root');
        if(root){
          if(localStorage.getItem('moragora-theme')==='dark'){
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
        }
      });
    </script>
  </head>
  <body>
    <!-- PWA 스플래시 화면 -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:#1B2A4A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
      <img src="/icon-192.png" alt="" style="width:80px;height:80px;border-radius:20px;" />
      <div style="height:30px;display:flex;align-items:center;">
        <span id="splash-typed" style="color:#D4AF37;font-size:22px;font-weight:900;letter-spacing:-0.5px;"></span><span id="splash-cursor" style="display:inline-block;width:2px;height:22px;background:#D4AF37;margin-left:2px;animation:blink 0.7s step-end infinite;"></span>
      </div>
      <style>@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}</style>
    </div>
    <script>
      // 타이핑 애니메이션
      (function(){
        var el = document.getElementById('splash-typed');
        if (!el) return;
        var phases = [
          { text: 'AI 논쟁 판결 플랫폼', type: true, pause: 800 },
          { text: 'AI 논쟁 판결 플랫폼', type: false, pause: 300 },
          { text: '모라고라?', type: true, pause: 600 },
          { text: '?', type: false, pause: 200 },
          { text: '.', type: true, pause: 9999 },
        ];
        var current = '';
        var phaseIdx = 0;
        var charIdx = 0;
        var speed = 80;
        var deleteSpeed = 40;

        function tick() {
          if (phaseIdx >= phases.length) return;
          var phase = phases[phaseIdx];

          if (phase.type) {
            // 타이핑 (current에 이어붙이기)
            if (charIdx < phase.text.length) {
              current += phase.text[charIdx];
              el.textContent = current;
              charIdx++;
              setTimeout(tick, speed);
            } else {
              // 타이핑 완료
              if (phase.pause >= 9999) {
                // 최종 상태 → 커서 숨김
                var cursor = document.getElementById('splash-cursor');
                if (cursor) cursor.style.display = 'none';
                return;
              }
              setTimeout(function() { phaseIdx++; charIdx = 0; tick(); }, phase.pause);
            }
          } else {
            // 지우기: 뒤에서부터 phase.text 길이만큼
            var target = current.length - phase.text.length;
            if (current.length > target) {
              current = current.slice(0, -1);
              el.textContent = current;
              setTimeout(tick, deleteSpeed);
            } else {
              setTimeout(function() { phaseIdx++; charIdx = 0; tick(); }, phase.pause);
            }
          }
        }

        // 0.5초 커서 깜빡임 후 시작
        setTimeout(tick, 500);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // standalone(PWA 설치) 여부 확인
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      // standalone이면 OS 스플래시가 있으므로 앱 내 스플래시 즉시 제거
      if (isStandalone) {
        var s = document.getElementById('splash');
        if (s) s.remove();
      }

      // 스플래시 제거 함수 (최소 5초 보장)
      var splashStart = Date.now();
      var splashMinMs = 5000;
      window.__removeSplash = function() {
        var elapsed = Date.now() - splashStart;
        var delay = Math.max(0, splashMinMs - elapsed);
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.style.transition = 'opacity 0.4s ease-out';
            splash.style.opacity = '0';
            setTimeout(function() { splash.remove(); }, 400);
          }
        }, delay);
      };
      // 안전장치: 15초 후 강제 제거 (로딩 실패 시)
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(function() { splash.remove(); }, 300); }
      }, 15000);
    </script>
  </body>
</html>
