name: Daily Debate Generator

on:
  schedule:
    # 6시간마다 (KST 02:00, 08:00, 14:00, 20:00)
    - cron: '0 17,23,5,11 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily debate
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error \
            https://teammoragora.onrender.com/api/cron/daily-debate
